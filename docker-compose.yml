version: '3.8'
services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    ports:
      - "8000:8000"
    container_name: gunpla-scraper
    env_file: .env
    networks:
      - gunpla-network
    restart: unless-stopped
    depends_on:
      - n8n

  n8n:
    image: n8nio/n8n:latest
    container_name: gunpla-n8n
    ports:
      - "5679:5678"
    env_file: .env
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - gunpla-network
    restart: unless-stopped

  supabase:
    image: supabase/postgres:15.1.0.147
    container_name: gunpla-supabase
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # From .env
      PGUSER: postgres
    volumes:
      - supabase-data:/var/lib/postgresql/data
      - ./supabase-init:/docker-entrypoint-initdb.d  # Schema init
    networks:
      - gunpla-network
    restart: unless-stopped

  doc-ingest:  # ← NOW CORRECTLY NESTED
    build:
      context: ./doc-ingest
      dockerfile: Dockerfile
    env_file:
      - .env  # Loads your Supabase/OpenAI keys      
    volumes:
      - ./doc-ingest:/app

    command: python ingest.py  # Clean CMD
    depends_on:
      - supabase
    networks:
      - gunpla-network
    restart: unless-stopped

volumes:
  n8n-data:
  supabase-data:

networks:
  gunpla-network:
    driver: bridge
