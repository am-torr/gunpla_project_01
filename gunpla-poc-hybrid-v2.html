<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gunpla Price Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;900&family=Rajdhani:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: 'Rajdhani', sans-serif;
      color: #d4e8d4;
      min-height: 100vh;
    }

    .page-label {
      display: inline-block;
      background: #16a34a;
      color: #000;
      font-family: 'Share Tech Mono', monospace;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .2em;
      padding: 8px 22px 8px 18px;
      clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
      margin: 0;
    }

    .hero-section {
      position: relative;
      overflow: hidden;
      min-height: 160px;
      display: flex;
      align-items: center;
      background:
        linear-gradient(90deg, rgba(10,30,15,.7) 0%, rgba(5,18,10,.5) 50%, transparent 80%),
        radial-gradient(ellipse at 80% 50%, rgba(120,0,0,.15) 0%, transparent 70%),
        #000;
    }

    .hero-emblem {
      position: absolute;
      right: 8%;
      top: 50%;
      transform: translateY(-50%) rotate(-12deg);
      font-family: 'Oswald', sans-serif;
      font-size: 320px;
      font-weight: 900;
      background: linear-gradient(110deg, 
        #6a0000 0%, 
        #8a0d0d 25%, 
        #9a1515 40%, 
        rgba(138,13,13,.6) 70%, 
        transparent 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: .35;
      line-height: 1;
      letter-spacing: -.05em;
      filter: blur(0.8px) brightness(1.1);
      user-select: none;
      pointer-events: none;
      z-index: 1;
    }

    .hero-hud {
      position: absolute;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      width: 70px;
      height: 70px;
      border: 1px solid rgba(22,163,74,.2);
      border-radius: 50%;
      opacity: .5;
    }

    .hero-hud::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(22,163,74,.15);
      border-radius: 50%;
    }

    .hero-hud::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      border: 1px solid rgba(22,163,74,.3);
      border-radius: 50%;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .section-banner {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 32px 40px 32px 120px;
      background: linear-gradient(90deg, rgba(15,45,25,.85) 0%, rgba(8,25,15,.6) 50%, transparent 100%);
      border-top: 1px solid rgba(22,163,74,.08);
      border-bottom: 1px solid rgba(22,163,74,.08);
    }

    .point-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 2.2rem;
      font-weight: 700;
      color: rgba(22,163,74,.35);
      letter-spacing: .06em;
      line-height: 1;
      text-shadow: 0 0 20px rgba(22,163,74,.15);
    }

    .point-label em {
      font-style: normal;
      color: #16a34a;
      font-size: 3rem;
      text-shadow: 0 0 30px rgba(22,163,74,.3);
    }

    .divider {
      color: rgba(200,200,200,.25);
      font-size: 2.2rem;
      margin: 0 24px;
      font-weight: 200;
    }

    .point-title {
      font-family: 'Oswald', sans-serif;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: .1em;
      color: #f5f5f5;
      text-transform: uppercase;
    }

    .section-block {
      border-top: 1px solid rgba(22,163,74,.08);
    }

    .section-label-tab {
      display: inline-block;
      background: #16a34a;
      color: #000;
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .2em;
      padding: 6px 20px 6px 16px;
      clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
    }

    .controls {
      display: flex;
      gap: 24px;
      padding: 24px 40px;
      background: rgba(8,18,12,.7);
      flex-wrap: wrap;
      align-items: flex-end;
      border-bottom: 1px solid rgba(22,163,74,.08);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .6rem;
      letter-spacing: .25em;
      color: #16a34a;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(22,163,74,.2);
    }

    select,
    input[type=number] {
      background: rgba(0,0,0,.6);
      border: 1px solid rgba(22,163,74,.2);
      color: #d4e8d4;
      font-family: 'Rajdhani', sans-serif;
      font-size: .9rem;
      padding: 9px 14px;
      border-radius: 0;
      outline: none;
      transition: all .2s;
    }

    select:focus,
    input[type=number]:focus {
      border-color: #16a34a;
      background: rgba(0,0,0,.8);
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px rgba(22,163,74,.25); }
      50%       { box-shadow: 0 0 20px rgba(22,163,74,.6), 0 0 40px rgba(22,163,74,.2); }
    }

    .btn {
      padding: 10px 28px;
      border: 1px solid #16a34a;
      background: transparent;
      color: #16a34a;
      font-family: 'Share Tech Mono', monospace;
      font-size: .7rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 0;
      clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
      animation: pulse-glow 2.8s ease-in-out infinite;
      transition: all .2s;
      text-shadow: 0 0 10px rgba(22,163,74,.3);
    }

    .btn:hover {
      background: rgba(22,163,74,.15);
      color: #22c55e;
      box-shadow: 0 0 25px rgba(22,163,74,.5);
      animation: none;
    }

    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
      animation: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #16a34a;
      box-shadow: 0 0 8px #16a34a;
      margin-right: 10px;
      animation: blink 1.5s ease-in-out infinite;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 10px 40px;
      background: rgba(5,12,8,.8);
      border-bottom: 1px solid rgba(22,163,74,.08);
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      letter-spacing: .12em;
      color: rgba(100,140,100,.7);
    }

    .status-bar .count {
      color: #16a34a;
      font-weight: 600;
    }

    .products-section {
      padding-bottom: 0;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: rgba(22,163,74,.08);
      padding: 40px 40px 60px;
    }

    .product-card {
      background: linear-gradient(135deg, rgba(5,25,15,.92) 0%, rgba(8,30,18,.88) 100%);
      backdrop-filter: blur(8px);
      padding: 24px 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      position: relative;
      transition: all .25s;
      border: 1px solid rgba(22,163,74,.15);
      border-left: 2px solid transparent;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%);
    }

    .product-card:hover {
      background: linear-gradient(135deg, rgba(10,35,20,.95) 0%, rgba(15,40,25,.92) 100%);
      border-left-color: #16a34a;
      border-color: rgba(22,163,74,.35);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,.5), 0 0 35px rgba(22,163,74,.15);
    }

    .product-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 24px;
      height: 24px;
      border-top: 1px solid rgba(22,163,74,.2);
      border-left: 1px solid rgba(22,163,74,.2);
    }

    .product-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 18px;
      height: 18px;
      border-bottom: 1px solid rgba(22,163,74,.35);
      border-right: 1px solid rgba(22,163,74,.35);
    }

    .card-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: .62rem;
      color: rgba(22,163,74,.45);
      letter-spacing: .12em;
      font-weight: 600;
    }

    .product-card .name {
      font-size: .84rem;
      font-weight: 600;
      letter-spacing: .04em;
      line-height: 1.5;
      text-transform: uppercase;
      color: #d8f0d8;
      flex: 1;
    }

    .product-card .price {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.5rem;
      color: #f0a83e;
      letter-spacing: .05em;
      font-weight: 700;
      text-shadow: 0 0 15px rgba(240,168,62,.25);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: .56rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 0;
      background: transparent;
      border: 1px solid rgba(22,163,74,.2);
      color: rgba(120,160,120,.75);
    }

    .tag.grade {
      border: 1px solid rgba(22,163,74,.5);
      color: #22c55e;
      background: rgba(22,163,74,.08);
    }

    .tag.in-stock {
      border: 1px solid rgba(22,163,74,.6);
      color: #2dd45c;
      background: rgba(22,163,74,.12);
    }

    .tag.out-stock {
      border: 1px solid rgba(244,67,54,.4);
      color: #f44336;
      background: rgba(244,67,54,.08);
    }

    .product-card a {
      margin-top: 6px;
      display: block;
      text-align: center;
      padding: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .6rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(120,160,120,.65);
      border: 1px solid rgba(22,163,74,.2);
      text-decoration: none;
      transition: all .2s;
    }

    .product-card a:hover {
      color: #22c55e;
      border-color: rgba(22,163,74,.5);
      background: rgba(22,163,74,.08);
    }

    .store-section {
      padding: 40px 40px 0;
    }

    .store-section h3 {
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      letter-spacing: .2em;
      color: rgba(22,163,74,.6);
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(22,163,74,.15);
    }

    .loading {
      text-align: center;
      padding: 60px 40px;
      font-family: 'Share Tech Mono', monospace;
      font-size: .75rem;
      letter-spacing: .2em;
      color: rgba(100,140,100,.5);
    }

    .error {
      margin: 24px 40px;
      padding: 16px 20px;
      border: 1px solid rgba(244,67,54,.4);
      background: rgba(244,67,54,.06);
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      letter-spacing: .12em;
      color: #f44336;
    }

    .footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid rgba(22,163,74,.08);
      font-family: 'Share Tech Mono', monospace;
      font-size: .6rem;
      letter-spacing: .16em;
      color: rgba(80,120,80,.5);
      text-transform: uppercase;
      background: rgba(0,0,0,.6);
    }

    .footer a {
      color: #16a34a;
      text-decoration: none;
    }

    @media (max-width: 1200px) {
      .products-grid { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 860px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); padding: 20px; }
      .section-banner { padding: 24px 20px 24px 80px; }
      .controls { padding: 16px 20px; }
      .status-bar { padding: 10px 20px; }
    }

    @media (max-width: 520px) {
      .products-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="page-label">ITEM DETAILS</div>

  <div class="hero-section">
    <div class="hero-emblem">G</div>
    <div class="hero-hud"></div>
    <div class="hero-content">
      <div class="section-banner">
        <span class="point-label">POINT.<em>01</em></span>
        <span class="divider">|</span>
        <span class="point-title">Gunpla Price Tracker</span>
      </div>
    </div>
  </div>

  <div class="section-block">
    <div class="section-label-tab">SEARCH & FILTER</div>
    <div class="controls">
      <div class="control-group">
        <label for="store">STORE</label>
        <select id="store" name="store">
          <option value="hobby-planet">Hobby Planet PH</option>
          <option value="hlj">Hobby Link Japan</option>
          <option value="all">All Stores</option>
        </select>
      </div>
      <div class="control-group">
        <label for="grade">GRADE</label>
        <select id="grade" name="grade">
          <option value="MG">Master Grade (MG)</option>
          <option value="HG">High Grade (HG)</option>
          <option value="RG">Real Grade (RG)</option>
          <option value="PG">Perfect Grade (PG)</option>
          <option value="SD">SD Gundam</option>
          <option value="">All Grades</option>
        </select>
      </div>
      <div class="control-group">
        <label for="sort">SORT</label>
        <select id="sort" name="sort">
          <option value="latest">Latest</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
        </select>
      </div>
      <div class="control-group">
        <label for="limit">LIMIT</label>
        <input type="number" id="limit" name="limit" value="10" min="1" max="50" style="width:70px">
      </div>
      <div class="control-group">
        <label>&nbsp;</label>
        <button class="btn" id="scrapeBtn" onclick="scrape()">SCRAPE LIVE</button>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="live-dot"></span><span id="statusText">Ready — click Scrape Live</span></span>
    <span class="count" id="countText"></span>
  </div>

  <div class="section-block products-section">
    <div class="section-label-tab">RESULTS</div>
    <div id="results"></div>
  </div>

  <div class="footer">
    Built by am-torr · <a href="https://github.com/am-torr" target="_blank">GitHub</a> · FastAPI + Python
  </div>

  <script>
    const API = '';

    async function scrape() {
      const store = document.getElementById('store').value;
      const grade = document.getElementById('grade').value;
      const sort  = document.getElementById('sort').value;
      const limit = document.getElementById('limit').value;
      const btn   = document.getElementById('scrapeBtn');

      btn.disabled = true;
      btn.textContent = 'SCRAPING...';
      document.getElementById('statusText').textContent = 'Fetching live data...';
      document.getElementById('countText').textContent = '';
      document.getElementById('results').innerHTML =
        `<div class="loading">◌ CONNECTING TO ${store.toUpperCase()}...</div>`;

      try {
        const params = new URLSearchParams({ store, grade, sort, limit });
        const res = await fetch(`${API}/api/scrape?${params}`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Scrape failed');

        if (data.results) {
          renderMultiStore(data);
        } else {
          renderSingleStore(data.store, data.products);
        }

        const total = data.total_count ?? data.count ?? 0;
        document.getElementById('statusText').textContent =
          'Scraped at ' + new Date().toLocaleTimeString();
        document.getElementById('countText').textContent = total + ' products found';

      } catch (err) {
        document.getElementById('results').innerHTML =
          `<div class="error">✕ ${err.message}<br><small style="opacity:.6">Make sure api_server.py is running on port 8000</small></div>`;
        document.getElementById('statusText').textContent = 'Error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'SCRAPE LIVE';
      }
    }

    function renderMultiStore(data) {
      let html = '';
      let globalIndex = 1;
      for (const r of data.results) {
        html += `<div class="store-section">
          <h3>${storeLabel(r.store)} — ${r.count} products</h3>`;
        html += r.products.length
          ? `<div class="products-grid">${renderCards(r.products, r.store, globalIndex)}</div>`
          : `<p style="color:rgba(100,140,100,.4);padding:12px;font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.12em">NO PRODUCTS FOUND</p>`;
        html += `</div>`;
        globalIndex += r.products.length;
      }
      document.getElementById('results').innerHTML = html;
    }

    function renderSingleStore(store, products) {
      if (!products.length) {
        document.getElementById('results').innerHTML =
          `<div class="loading">NO PRODUCTS FOUND — TRY DIFFERENT FILTERS</div>`;
        return;
      }
      document.getElementById('results').innerHTML =
        `<div class="products-grid">${renderCards(products, store, 1)}</div>`;
    }

    function renderCards(products, store, startIndex = 1) {
      return products.map((p, i) => {
        const num       = String(startIndex + i).padStart(2, '0');
        const storeTag  = store === 'hlj' ? 'HLJ' : 'HP';
        const stockClass = p.stock === 'In Stock' ? 'in-stock' : 'out-stock';
        const symbol    = p.currency === 'JPY' ? '¥' : '₱';
        return `<div class="product-card">
          <div class="card-num">${num}</div>
          <div class="name">${p.name}</div>
          <div class="price">${symbol}${Number(p.price).toLocaleString()}</div>
          <div class="meta">
            <span class="tag grade">${p.grade}</span>
            <span class="tag">${p.scale}</span>
            <span class="tag">${storeTag}</span>
            <span class="tag ${stockClass}">${p.stock}</span>
          </div>
          <a href="${p.url}" target="_blank">VIEW PRODUCT →</a>
        </div>`;
      }).join('');
    }

    function storeLabel(store) {
      return store === 'hlj' ? 'Hobby Link Japan' : 'Hobby Planet PH';
    }

    window.onload = () => scrape();
  </script>

</body>
</html>
