<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunpla Price Tracker</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        color: white;
        padding: 20px;
        min-height: 100vh;
    }
    
    .header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
        background: linear-gradient(90deg, #4CAF50, #2196F3);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    
    .header p {
        color: #aaa;
        font-size: 1.1em;
    }
    
    .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 24px;
        align-items: flex-end;
    }
    
    .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    
    .control-group label {
        color: #aaa;
        font-size: 0.85em;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    select,
    input[type=number] {
        background: #0f3460;
        color: white;
        border: 1px solid #2196F3;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 0.95em;
        cursor: pointer;
    }
    
    .btn {
        padding: 10px 24px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1em;
        font-weight: bold;
        transition: all 0.2s;
    }
    
    .btn-primary {
        background: linear-gradient(90deg, #4CAF50, #2196F3);
        color: white;
    }
    
    .btn-primary:hover {
        opacity: 0.85;
        transform: translateY(-1px);
    }
    
    .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }
    
    .status-bar {
        background: #0f3460;
        border-radius: 8px;
        padding: 10px 16px;
        margin-bottom: 16px;
        font-size: 0.9em;
        color: #aaa;
        display: flex;
        justify-content: space-between;
    }
    
    .status-bar .count {
        color: #4CAF50;
        font-weight: bold;
    }
    
    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
    }
    
    .product-card {
        background: #0f3460;
        border-radius: 10px;
        padding: 16px;
        border: 1px solid #1a4a8a;
        transition: transform 0.2s;
    }
    
    .product-card:hover {
        transform: translateY(-3px);
        border-color: #2196F3;
    }
    
    .product-card .name {
        font-weight: bold;
        font-size: 0.95em;
        margin-bottom: 10px;
        line-height: 1.4;
    }
    
    .product-card .price {
        font-size: 1.4em;
        color: #4CAF50;
        font-weight: bold;
        margin: 8px 0;
    }
    
    .product-card .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 8px 0;
    }
    
    .tag {
        background: #1a1a2e;
        border-radius: 4px;
        padding: 2px 8px;
        font-size: 0.78em;
        color: #aaa;
    }
    
    .tag.grade {
        color: #2196F3;
        border: 1px solid #2196F3;
    }
    
    .tag.store-hp {
        color: #4CAF50;
        border: 1px solid #4CAF50;
    }
    
    .tag.store-hlj {
        color: #FF9800;
        border: 1px solid #FF9800;
    }
    
    .tag.in-stock {
        color: #4CAF50;
    }
    
    .tag.out-stock {
        color: #f44336;
    }
    
    .product-card a {
        display: block;
        text-align: center;
        margin-top: 12px;
        padding: 6px;
        background: #1a4a8a;
        border-radius: 6px;
        color: #2196F3;
        text-decoration: none;
        font-size: 0.85em;
    }
    
    .product-card a:hover {
        background: #2196F3;
        color: white;
    }
    
    .loading {
        text-align: center;
        padding: 40px;
        color: #aaa;
        font-size: 1.1em;
    }
    
    .error {
        background: #3d1515;
        border: 1px solid #f44336;
        border-radius: 8px;
        padding: 16px;
        color: #f44336;
        margin: 16px 0;
    }
    
    .store-section {
        margin-bottom: 32px;
    }
    
    .store-section h3 {
        color: #aaa;
        font-size: 0.9em;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #1a4a8a;
    }
    </style>
</head>
<body>
    <div class="header">
        <h1> Gunpla Price Tracker</h1>
        <p>Live scraping  Hobby Planet PH + Hobby Link Japan</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Store</label>
            <select id="store">
                <option value="hobby-planet">Hobby Planet PH</option>
                <option value="hlj">Hobby Link Japan</option>
                <option value="all">All Stores</option>
            </select>
        </div>
        <div class="control-group">
            <label>Grade</label>
            <select id="grade">
                <option value="MG">Master Grade (MG)</option>
                <option value="HG">High Grade (HG)</option>
                <option value="RG">Real Grade (RG)</option>
                <option value="PG">Perfect Grade (PG)</option>
                <option value="SD">SD Gundam</option>
                <option value="">All Grades</option>
            </select>
        </div>
        <div class="control-group">
            <label>Sort</label>
            <select id="sort">
                <option value="latest">Latest</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
            </select>
        </div>
        <div class="control-group">
            <label>Limit</label>
            <input type="number" id="limit" value="10" min="1" max="50" style="width:70px">
        </div>
        <div class="control-group">
            <label>&nbsp;</label>
            <button class="btn btn-primary" id="scrapeBtn" onclick="scrape()"> Scrape Live</button>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusText">Ready  click Scrape Live</span>
        <span class="count" id="countText"></span>
    </div>

    <div id="results"></div>

    <script>
        const API = '';

        async function scrape() {
            const store = document.getElementById('store').value;
            const grade = document.getElementById('grade').value;
            const sort  = document.getElementById('sort').value;
            const limit = document.getElementById('limit').value;
            const btn   = document.getElementById('scrapeBtn');

            btn.disabled = true;
            btn.textContent = ' Scraping...';
            document.getElementById('statusText').textContent = 'Fetching live data...';
            document.getElementById('countText').textContent = '';
            document.getElementById('results').innerHTML = '<div class="loading"> Connecting to ' + store + '...</div>';

            try {
                const params = new URLSearchParams({ store, grade, sort, limit });
                const res = await fetch(`${API}/api/scrape?${params}`);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                if (!data.success) throw new Error(data.error || 'Scrape failed');

                if (data.results) {
                    renderMultiStore(data);
                } else {
                    renderSingleStore(data.store, data.products);
                }

                const total = data.total_count ?? data.count ?? 0;
                document.getElementById('statusText').textContent = 'Scraped at ' + new Date().toLocaleTimeString();
                document.getElementById('countText').textContent = total + ' products found';

            } catch (err) {
                document.getElementById('results').innerHTML = '<div class="error"> ' + err.message + '<br><small>Make sure api_server.py is running on port 8000</small></div>';
                document.getElementById('statusText').textContent = 'Error';
            } finally {
                btn.disabled = false;
                btn.textContent = ' Scrape Live';
            }
        }

        function renderMultiStore(data) {
            let html = '';
            for (const r of data.results) {
                html += '<div class="store-section"><h3>' + storeLabel(r.store) + '  ' + r.count + ' products</h3>';
                html += r.products.length ? '<div class="products-grid">' + renderCards(r.products, r.store) + '</div>' : '<p style="color:#555;padding:12px">No products found</p>';
                html += '</div>';
            }
            document.getElementById('results').innerHTML = html;
        }

        function renderSingleStore(store, products) {
            if (!products.length) {
                document.getElementById('results').innerHTML = '<div class="loading" style="color:#666">No products found. Try different filters.</div>';
                return;
            }
            document.getElementById('results').innerHTML = '<div class="products-grid">' + renderCards(products, store) + '</div>';
        }

        function renderCards(products, store) {
            return products.map(p => {
                const storeTag = store === 'hlj' ? '<span class="tag store-hlj">HLJ</span>' : '<span class="tag store-hp">HP</span>';
                const stockClass = p.stock === 'In Stock' ? 'in-stock' : 'out-stock';
                const symbol = p.currency === 'JPY' ? '' : '';
                return '<div class="product-card">' +
                    '<div class="name">' + p.name + '</div>' +
                    '<div class="price">' + symbol + Number(p.price).toLocaleString() + '</div>' +
                    '<div class="meta">' +
                        '<span class="tag grade">' + p.grade + '</span>' +
                        '<span class="tag">' + p.scale + '</span>' +
                        storeTag +
                        '<span class="tag ' + stockClass + '">' + p.stock + '</span>' +
                    '</div>' +
                    '<a href="' + p.url + '" target="_blank">View Product </a>' +
                    '</div>';
            }).join('');
        }

        function storeLabel(store) {
            return store === 'hlj' ? ' Hobby Link Japan' : ' Hobby Planet PH';
        }

        window.onload = () => scrape();
    </script>
</body>
</html>
