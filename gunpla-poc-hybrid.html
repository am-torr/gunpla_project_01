<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunpla Price Tracker POC - Hybrid Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p {
            color: #aaa;
            font-size: 1.1em;
        }
        .container {
            display: grid;
            grid-template-columns: 35% 30% 35%;
            gap: 20px;
            height: calc(100vh - 150px);
            max-width: 1800px;
            margin: 0 auto;
        }
        .panel {
            background: rgba(42, 42, 42, 0.8);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #444;
        }
        .panel-header h2 {
            font-size: 1.3em;
            color: #4CAF50;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge {
            font-size: 0.7em;
            padding: 4px 8px;
            border-radius: 4px;
            background: #4CAF50;
            color: black;
            font-weight: bold;
        }
        .badge.static {
            background: #FFA726;
        }
        iframe {
            width: 100%;
            flex: 1;
            border: none;
            border-radius: 8px;
            background: white;
        }
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .comparison-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #1e1e1e 100%);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .comparison-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
        }
        .product-name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
            color: #fff;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        .store-label {
            font-weight: 600;
            color: #aaa;
        }
        .price {
            font-size: 1.2em;
            font-weight: bold;
        }
        .price.hp {
            color: #4CAF50;
        }
        .price.hlj {
            color: #2196F3;
        }
        .savings {
            text-align: center;
            padding: 8px;
            margin-top: 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .savings.positive {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        .savings.negative {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
        }
        .hlj-product-card {
            background: linear-gradient(135deg, #1e3a5f 0%, #2a2a2a 100%);
            border: 1px solid #2196F3;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .hlj-product-card:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 25px rgba(33, 150, 243, 0.4);
        }
        .hlj-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .hlj-title {
            font-weight: bold;
            font-size: 1em;
            color: #2196F3;
        }
        .hlj-price {
            font-size: 1.4em;
            font-weight: bold;
            color: #2196F3;
        }
        .hlj-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.9em;
        }
        .hlj-detail {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 4px;
        }
        .hlj-detail strong {
            color: #2196F3;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .last-updated {
            text-align: center;
            padding: 10px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #4CAF50;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .empty-state h3 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1> Gunpla Price Tracker POC</h1>
        <p>Real-time price comparison across Philippine stores</p>
    </div>

    <div class="container">
        <!-- LEFT: Hobby Planet Live Iframe -->
        <div class="panel">
            <div class="panel-header">
                <h2> Hobby Planet <span class="badge">LIVE</span></h2>
            </div>
            <iframe src="https://hobbyplanet.info/product-category/gundam-model-kits/"></iframe>
        </div>

        <!-- CENTER: Scraped Data Comparison -->
        <div class="panel">
            <div class="panel-header">
                <h2> Price Comparison</h2>
            </div>
            <div class="content" id="comparison-content">
                <div class="loading"> Loading comparison data...</div>
            </div>
        </div>

        <!-- RIGHT: HLJ Product Cards -->
        <div class="panel">
            <div class="panel-header">
                <h2> Hobby Link Japan <span class="badge static">SCRAPED</span></h2>
            </div>
            <div class="content" id="hlj-content">
                <div class="loading"> Loading HLJ products...</div>
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration (replace with your actual values)
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

        // Mock data for demonstration (replace with actual Supabase fetch)
        const mockData = {
            comparison: [
                {
                    product_name: 'Daban 6609 MG 1/100 Duel Gundam Assault Shroud',
                    grade: 'MG',
                    scale: '1/100',
                    hp_price: 1150,
                    hlj_price: null,
                    hp_stock: 'In Stock',
                    hlj_stock: null
                },
                {
                    product_name: 'Daban MG 1/100 Aegis Gundam (#6617)',
                    grade: 'MG',
                    scale: '1/100',
                    hp_price: 1250,
                    hlj_price: null,
                    hp_stock: 'In Stock',
                    hlj_stock: null
                },
                {
                    product_name: 'M-Boy Model MG 1/100 Hazel Gundam Custom MZ-001',
                    grade: 'MG',
                    scale: '1/100',
                    hp_price: 1200,
                    hlj_price: null,
                    hp_stock: 'In Stock',
                    hlj_stock: null
                }
            ],
            hlj_products: [
                {
                    product_name: 'Gunpla Catalog Special Edition: Gunpla 45th Anniversary',
                    grade: 'Book',
                    price: 1497,
                    currency: 'JPY',
                    php_price: 839,
                    stock_status: 'Order now!',
                    sku: 'HBJ64136'
                },
                {
                    product_name: 'Gundam Weapons Gunpla 45th Anniversary RX-93 New Gundam',
                    grade: 'Book',
                    price: 1723,
                    currency: 'JPY',
                    php_price: 965,
                    stock_status: 'Order now!',
                    sku: 'HBJ64071'
                },
                {
                    product_name: '1/144 Option Parts Set Gunpla 13 (Gunpla Battle Arm Arms)',
                    grade: 'HG',
                    price: 363,
                    currency: 'JPY',
                    php_price: 203,
                    stock_status: 'Order now!',
                    sku: 'BANH674296'
                }
            ]
        };

        // Load comparison data
        function loadComparison() {
            const container = document.getElementById('comparison-content');
            
            // In production, fetch from Supabase:
            // fetch(SUPABASE_URL + '/rest/v1/products?select=*,store_prices(*)')
            
            const html = '<div class="last-updated"> Last updated: Just now</div>' +
                mockData.comparison.map(item => {
                    return \
                        <div class="comparison-card">
                            <div class="product-name">\</div>
                            <div class="price-row">
                                <span class="store-label">Hobby Planet:</span>
                                <span class="price hp">\</span>
                            </div>
                            <div class="price-row">
                                <span class="store-label">Stock Status:</span>
                                <span style="color: #4CAF50;">\</span>
                            </div>
                            <div style="text-align: center; margin-top: 10px; color: #666; font-size: 0.9em;">
                                \ | \
                            </div>
                        </div>
                    \;
                }).join('');
            
            container.innerHTML = html;
        }

        // Load HLJ products
        function loadHLJProducts() {
            const container = document.getElementById('hlj-content');
            
            const html = '<div class="last-updated"> Last scraped: 2 hours ago</div>' +
                mockData.hlj_products.map(item => {
                    return \
                        <div class="hlj-product-card">
                            <div class="hlj-header">
                                <div class="hlj-title">\</div>
                            </div>
                            <div class="hlj-price">\ <span style="font-size: 0.7em; color: #aaa;">(\)</span></div>
                            <div class="hlj-details">
                                <div class="hlj-detail"><strong>Grade:</strong> \</div>
                                <div class="hlj-detail"><strong>Stock:</strong> \</div>
                                <div class="hlj-detail"><strong>SKU:</strong> \</div>
                                <div class="hlj-detail"><strong>Currency:</strong> \</div>
                            </div>
                        </div>
                    \;
                }).join('');
            
            container.innerHTML = html;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadComparison();
            loadHLJProducts();
            
            // Auto-refresh every 30 seconds
            setInterval(() => {
                loadComparison();
                loadHLJProducts();
            }, 30000);
        });

        console.log(' Gunpla Price Tracker POC loaded');
        console.log('Left: Hobby Planet Live Site');
        console.log('Center: Real-time comparison data');
        console.log('Right: HLJ scraped products');
    </script>
</body>
</html>
